name: CI

on:
  push:
    branches:
      - master
    paths:
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.changeset/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.changeset/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Format
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: pnpm format:check -- --base "$BASE_SHA"

      - name: Lint (ESLint)
        run: pnpm lint:eslint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm --filter kra-ui test -- --ci --runInBand --watchman=false

      - name: Build
        run: pnpm build

      - name: Docs build
        run: pnpm --filter kra-ui-docs build

      - name: Example type check
        run: pnpm --filter kra-ui-example typecheck
