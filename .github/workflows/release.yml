name: Release

on:
  pull_request:
    branches: [master]
  push:
    tags: ["v*.*.*"]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  build-apk:
    if: startsWith(github.ref, 'refs/tags/')
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install
        working-directory: packages/example

      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: packages/example/android

      - name: Rename APK
        run: mv packages/example/android/app/build/outputs/apk/release/*.apk kra-ui-example-${{ github.ref_name }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: kra-ui-example
          path: kra-ui-example-${{ github.ref_name }}.apk

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Publish to npm
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PUBLISH_PACKAGE_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: kra-ui-example

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: kra-ui-example-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN: ${{ secrets.PR_GITHUB_TOKEN }}
