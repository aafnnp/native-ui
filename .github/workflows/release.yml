name: Release

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    tags: ["kra-ui@*.*.*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  changesets:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm publish-packages
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.PR_GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.PUBLISH_PACKAGE_TOKEN }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-apk:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install
        working-directory: packages/example

      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: packages/example/android
        env:
          # 避免 CI 上 Gradle 在依赖收集/打包阶段 OOM（Java heap space）
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8" -Dkotlin.daemon.jvm.options="-Xmx2g"
          JAVA_TOOL_OPTIONS: -Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
          # CI 构建示例 APK 优先稳定性：关闭 New Architecture，避免部分原生依赖的 CMake/Prefab 兼容问题
          ORG_GRADLE_PROJECT_newArchEnabled: "false"

      - name: Rename APK
        run: mv packages/example/android/app/build/outputs/apk/release/*.apk kra-ui-example-${{ github.ref_name }}.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: kra-ui-example-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
